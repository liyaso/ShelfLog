<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics • ShelfLog</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <h1>ShelfLog</h1>
    </div>

    <div class="nav-container">
        <a href="welcome.html">Home</a>
        <a href="index.html">Search</a>
        <a href="mybooks.html">My Books</a>
        <a href="readinglist.html">Reading List</a>
        <a href="reviews.html">Reviews</a>
        <a class="active" href="statistics.html">Statistics</a>
    </div>

    <div class="container">
        <h2>Your Reading Statistics</h2>

        <div class="results">
            <div class="book-card">
                <h3>Books Read This Month</h3>
                <p id="stat-books-month">0</p>
            </div>

            <div class="book-card">
                <h3>Pages Read This Week</h3>
                <p id="stat-pages-week">0</p>
            </div>

            <div class="book-card">
                <h3>Average Pages/Day</h3>
                <p id="stat-pages-day">0</p>
            </div>
        </div>

        <h3 style="margin-top: 40px;">Goal Progress Over Time</h3>
        <div id="milestone-chart" style="height: 300px; background: #fff; border-radius: 10px;"></div>
    </div>

    <script src="statistics.js"></script>
</body>

</html>
