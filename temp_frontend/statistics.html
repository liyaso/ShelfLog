<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics • ShelfLog</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button id="logout-btn" class="logout-floating">Logout</button>

    <div class="header">
        <h1>ShelfLog</h1>
    </div>

    <div class="nav-container">
        <a href="welcome.html">Home</a>
        <a href="index.html">Search</a>
        <a href="readinglist.html">Reading List</a>
        <a href="reviews.html">Reviews</a>
        <a class="active" href="statistics.html">Statistics</a>
    </div>

    <div class="container">
        <h2>Your Reading Statistics</h2>

        <div class="results">
        
            <div class="book-card">
                <h3>Books Read This Month</h3>
                <p id="stat-books-month">0</p>
            </div>
        
            <div class="book-card">
                <h3>Total Books Read</h3>
                <p id="stat-books-total">0</p>
            </div>
        
            <div class="book-card">
                <h3>Books Read This Year</h3>
                <p id="stat-books-year">0</p>
            </div>
        
            <div class="book-card">
                <h3>Fastest Read Book</h3>
                <p id="stat-fastest-book">—</p>
            </div>
        
            <div class="book-card">
                <h3>Most Read Author</h3>
                <p id="stat-author">—</p>
            </div>
        
            <div class="book-card">
                <h3>Average Rating Given</h3>
                <p id="stat-rating">0</p>
            </div>
        
        </div>

        <h3 style="margin-top: 40px;">Goal Progress Over Time</h3>
        <button id="set-goal-btn" class="primary" style="margin: 10px auto; display:block;">
            Set Reading Goal
        </button>
        
        <!-- SET GOAL POPUP -->
        <div id="set-goal-popup" class="popup hidden">
            <div class="popup-content">
                <button id="goal-close" class="close-btn">×</button>
        
                <h3>Set Your Yearly Reading Goal</h3>
        
                <input type="number" id="goal-input" placeholder="Enter number of books..." min="1">
        
                <div class="popup-actions">
                    <button id="save-goal-btn" class="primary">Save Goal</button>
                </div>
            </div>
        </div>
        <div class="goal-ring-container">
            <canvas id="goalRing"></canvas>
            <div id="goalRingLabel" class="goal-ring-label"></div>
        </div>

    </div>
    <script>
        document.getElementById("logout-btn").addEventListener("click", () => {
            const confirmLogout = confirm("Are you sure you want to log out?");
            if (!confirmLogout) return;

            localStorage.clear();
            window.location.href = "login.html";
        });
    </script>


    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="statistics.js"></script>
</body>

</html>
