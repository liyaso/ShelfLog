<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ShelfLog</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <h1>ShelfLog</h1>
    </div>

    <div class="nav-container">
        <a href="welcome.html">Home</a>
        <a class="active" href="index.html">Search</a>
        <a href="readinglist.html">Reading List</a>
        <a href="reviews.html">Reviews</a>
        <a href="statistics.html">Statistics</a>
    </div>

    <div class="container">

        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search books by title, author, or ISBN...">
            <button id="search-button">Search</button>
        </div>

        <div class="results" id="results"></div>
        <div id="pagination" class="pagination"></div>

    </div>

    <!-- BOOK DETAILS POPUP -->
    <div id="book-page" class="book-page hidden">
        <div class="page-content">
            <button id="page-close">x</button>

            <div class="page-body">

                <div class="page-left">
                    <div id="page-cover"></div>

                    <div class="page-add-rating">
                        <label>Rate this book</label>
                        <div class="star-rating">
                            <span class="star" data-value="1">☆</span>
                            <span class="star" data-value="2">☆</span>
                            <span class="star" data-value="3">☆</span>
                            <span class="star" data-value="4">☆</span>
                            <span class="star" data-value="5">☆</span>
                        </div>

                        <div class="page-rating">
                            <p>Rating: <span id="book-rating"></span></p>
                        </div>
                    </div>
                </div>

                <div class="page-right">
                    <h2 id="page-title"></h2>
                    <p id="page-author"></p>
                    <p id="page-description"></p>
                    <p id="page-genre"></p>

                    <div class="page-style">
                        <span id="page-pages"></span>
                        <span id="page-language"></span>
                    </div>

                    <div class="page-style">
                        <span id="page-year"></span>
                        <span id="page-publisher"></span>
                    </div>

                    <div class="page-isbn">
                        <span id="page-isbn"></span>
                    </div>

                    <div class="page-action">
                        <button id="add-to-list-button">+ Add to Reading List</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- CONFIRMATION POPUP -->
    <div id="confirm-add-popup" class="modal hidden">
        <div class="modal-content">
            <h3>Add to Reading List?</h3>
            <p id="confirm-book-title"></p>

            <div class="modal-actions">
                <button id="confirm-add-btn" class="confirm-btn">Add</button>
                <button id="cancel-add-btn" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>
    

    <script src="frontend-JS/app.js"></script>
</body>

</html>
