<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading List • ShelfLog</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <h1>ShelfLog</h1>
    </div>

    <div class="nav-container">
        <a href="welcome.html">Home</a>
        <a href="index.html">Search</a>
        <a class="active" href="readinglist.html">Reading List</a>
        <a href="reviews.html">Reviews</a>
        <a href="statistics.html">Statistics</a>
    </div>

    <div class="container">
        <h2>My Reading Lists</h2>

        <button id="create-list-btn" class="primary create-btn">+ Create New List</button>

        <div id="lists-container" class="list-grid"></div>

        <h2 id="selected-list-title" class="hidden"></h2>
        <div id="reading-list-container" class="results"></div>
    </div>

    <!-- Create List Popup -->
    <div id="create-list-popup" class="popup hidden">
        <div class="popup-content">
            <button id="create-close" class="close-btn">×</button>

            <h3>Create New Reading List</h3>
            <input id="new-list-name" type="text" placeholder="List name...">

            <div class="popup-actions">
                <button id="save-list-btn" class="primary">Create</button>
            </div>
        </div>
    </div>

    <!-- Book Popup -->
    <div id="review-popup" class="popup hidden">
        <div class="popup-content">
            <button id="popup-close" class="close-btn">×</button>

            <div id="popup-book-info"></div>

            <textarea id="review-text" placeholder="Write your review when you finish reading..."></textarea>

            <div class="popup-actions">
                <button id="save-review-btn" class="primary">Save Review</button>
                <button id="remove-book-btn" class="danger">Remove from List</button>
            </div>
        </div>
    </div>

    <div id="start-reading-popup" class="popup hidden">
        <div class="popup-content small-popup">
            <p id="start-reading-msg"></p>
        </div>
    </div>


    <script src="readinglist.js"></script>
</body>

</html>
