<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews • ShelfLog</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button id="logout-btn" class="logout-floating">Logout</button>

    <div class="header">
        <h1>ShelfLog</h1>
    </div>

    <div class="nav-container">
        <a href="welcome.html">Home</a>
        <a href="index.html">Search</a>
        <a href="readinglist.html">Reading List</a>
        <a class="active" href="reviews.html">Reviews</a>
        <a href="statistics.html">Statistics</a>
    </div>

    <div class="container">
        <h2>Your Reviews</h2>

        <div id="reviews-container" class="results"></div>
    </div>

    <!-- REVIEW POPUP -->
    <div id="review-popup" class="popup hidden">
        <div class="popup-content">
            <button id="popup-close" class="close-btn">×</button>
            <div id="popup-book-info"></div>
            <div class="popup-rating">
                <label>Rate this book:</label>
                <div class="popup-stars">
                    <span class="popup-star" data-value="1">☆</span>
                    <span class="popup-star" data-value="2">☆</span>
                    <span class="popup-star" data-value="3">☆</span>
                    <span class="popup-star" data-value="4">☆</span>
                    <span class="popup-star" data-value="5">☆</span>
                </div>
            </div>


            <textarea id="review-text" placeholder="Write your review..."></textarea>

            <div class="popup-actions">
                <button id="save-review-btn" class="primary">Save Review</button>
                <button id="delete-review-btn" class="danger">Delete Review</button>
            </div>
        </div>
    </div>
    <script>
        document.getElementById("logout-btn").addEventListener("click", () => {
            const confirmLogout = confirm("Are you sure you want to log out?");
            if (!confirmLogout) return;

            localStorage.clear();
            window.location.href = "login.html";
        });
    </script>


    <script src="reviews.js"></script>
</body>

</html>
