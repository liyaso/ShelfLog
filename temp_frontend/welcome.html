<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome • ShelfLog</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <h1>ShelfLog</h1>
    </div>

    <div class="nav-container">
        <a class="active" href="welcome.html">Home</a>
        <a href="index.html">Search</a>
        <a href="mybooks.html">My Books</a>
        <a href="readinglist.html">Reading List</a>
    </div>

    <div class="container">
        <h2 id="welcome-user">Welcome!</h2>

        <div class="goal-box">
            <h3>Your Reading Goal</h3>
            <p>You’ve read <strong>4</strong> out of <strong>12</strong> books this year.</p>

            <div class="goal-progress">
                <div class="goal-fill" style="width: 33%;"></div>
            </div>
        </div>

        <div class="results" style="margin-top: 40px;">
            <div class="book-card" onclick="location.href='mybooks.html'">
                <h3>📚 My Books</h3>
                <p>View all books you’ve added.</p>
            </div>
        
            <div class="book-card" onclick="location.href='readinglist.html'">
                <h3>📝 Reading List</h3>
                <p>Books you plan to read next.</p>
            </div>
        
            <div class="book-card" onclick="location.href='index.html'">
                <h3>🔍 Search Books</h3>
                <p>Find new books to explore.</p>
            </div>
        </div>
    </div>


</body>

</html>
